[pytest]
markers =
    live_llm: requires a real local LLM endpoint (excluded from the fast suite).

# Default test run skips live LLM tests. They're slow + non-deterministic and
# need a running Ollama with qwen3:30b-a3b (or whatever LLM_MODEL points at).
# Run them explicitly with: pytest -m live_llm
addopts = -m "not live_llm"
